<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <header>
                <h1 id="title">Login</h1>
            </header>
            <form action="">
                <input type="text" placeholder="Name" id="nameField">
                <input type="email" placeholder="Username or Email Address" id="email">
                <input type="password" placeholder="Password" id="pswrd">
                <a href="">Forgot Password</a>
                <input type="button" value="Login" id="signInbtn">

                <div class="links">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                </div>

                <p class="signup">Not a member? <a href="#" id="signUpbtn">Sign Up</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
